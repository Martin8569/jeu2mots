name: Deploy to Netlify

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install netlify
        run: npm install -g netlify-cli --silent

      - name: List sites and deploy
        run: |
          echo "--- Sites Netlify ---"
          netlify sites:list --auth "$NETLIFY_AUTH_TOKEN"
          echo "--- Deploy ---"
          netlify deploy --prod --dir . --auth "$NETLIFY_AUTH_TOKEN" --site jeu2mots
          echo "--- Done ---"
