name: Deploy to Netlify

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find site and deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli --silent
          echo "=== Sites disponibles ==="
          netlify sites:list --auth $NETLIFY_AUTH_TOKEN --json | python3 -c "
import sys,json
sites = json.load(sys.stdin)
for s in sites:
    print(s['id'], s['name'], s.get('ssl_url',''))
"
          echo "=== Déploiement ==="
          netlify deploy --prod --dir . \
            --auth $NETLIFY_AUTH_TOKEN \
            --site jeu2mots
