name: Deploy to Netlify

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli --silent
          echo "=== Sites disponibles ==="
          netlify sites:list --auth $NETLIFY_AUTH_TOKEN 2>/dev/null | head -20
          echo "=== Déploiement ==="
          netlify deploy --prod --dir . --auth $NETLIFY_AUTH_TOKEN --site jeu2mots 2>&1
