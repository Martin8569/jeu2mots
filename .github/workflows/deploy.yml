name: Deploy to Netlify

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli --silent
          SITE_ID=$(netlify sites:list --auth $NETLIFY_AUTH_TOKEN --json | python3 -c "
import sys,json
sites = json.load(sys.stdin)
for s in sites:
    if 'jeu2mots' in s.get('name','') or 'jeu2mots' in s.get('ssl_url','') or 'jeu.2mots' in s.get('ssl_url',''):
        print(s['id'])
        break
")
          echo "Site ID trouvé : $SITE_ID"
          netlify deploy --prod --dir . --auth $NETLIFY_AUTH_TOKEN --site $SITE_ID
